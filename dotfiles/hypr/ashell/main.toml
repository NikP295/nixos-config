log_level = "warn"
#outputs = { Targets = ["eDP-1"] }
position = "Top"

[modules]
left = [ "Workspaces" ]
center = [ "WindowTitle" ]
right = [ "Clock", "AudioDevices", "AudioApps", "Tray", "Settings"]

[updates]
check_cmd = "checkupdates; paru -Qua"
update_cmd = 'kitty -e bash -c "paru; echo Done - Press enter to exit; read" &'
interval = 3600

[workspaces]
visibility_mode = "All"
enable_workspace_filling = true
max_workspaces = 10

[window_title]
mode = "Title"
truncate_title_after_length = 100

[tempo]
clock_format = "%a %d %b %R"
# formats = [ "%a %d %b %R", "%Y-%m-%d %H:%M:%S", "%H:%M:%S" ]
# timezones = [ "UTC", "America/New_York", "Europe/London" ]
weather_location = { City = "Ljubljana" }
# weather_location = { Coordinates = [40.7128, -74.0060] }
# weather_location = "Current"
weather_indicator = "IconAndTemperature"

[settings]
lock_cmd = "playerctl --all-players pause; nixGL hyprlock &"

shutdown_cmd = "poweroff"
suspend_cmd = "systemctl suspend"
hibernate_cmd = "systemctl hibernate"
reboot_cmd = "systemctl reboot"
logout_cmd = "loginctl kill-user $(whoami)"

wifi_more_cmd = "nm-connection-editor"
bluetooth_more_cmd = "blueberry"
battery_format = "IconAndPercentage"

peripheral_battery_format = "Icon"
audio_indicator_format = "Icon"
microphone_indicator_format = "Icon"
network_indicator_format = "Icon"
bluetooth_indicator_format = "Icon"

brightness_indicator_format = "Icon"

indicators = [ "IdleInhibitor", "PowerProfile", "Audio", "Microphone", "Bluetooth", "Network", "Battery", "Brightness" ]



[[CustomModule]]
name = "AudioDevices"
icon = "🎧"
command = "bash ~/.config/hypr/quickshell/audio/show_audio_devices.sh"

[[CustomModule]]
name = "AudioApps"
icon = "🔊"
command = "bash ~/.config/hypr/quickshell/audio/show_audio_apps.sh"


[appearance]
style = "Islands"
scale_factor = 1.3

success_color = "#ff0000"

workspace_colors = [ "#09b18a", "#ff0000", "#ff0000" ]
special_workspace_colors = [ "#0b6a55", "#ff0000" ]


[appearance.text_color]
base = "#09b18a"
weak = "#0b6a55"
strong = "#ff0000"

[appearance.danger_color]
base = "#f7768e"
weak = "#e0af68"

[appearance.background_color]
base = "#231f23"
weak = "#24273a"
strong = "#414868"

[appearance.secondary_color]
base = "#0b6a55"

[appearance.primary_color]
base = "#41f0c7"
weak = "#ff0000"
